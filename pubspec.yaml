name: asm8086_ide
description: 8086 Assembly IDE with TASM-compatible assembler and debugger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  file_picker: ^8.1.5
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
